    No login / No tracking / No ads / Browser only<br>
    <a href="javascript:void(0)" onclick="showSupport()" style="color: #666; text-decoration: underline; font-weight: 700;">Privacy Policy</a> / afrorakda © 2026
</footer>

<div id="support-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000;" onclick="closeSupport()">
    <div class="modal-content" style="background: #fff; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center;" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; color:#111;">Support & Info</h3>
        <p style="font-size: 0.85rem; color: #444; line-height: 1.4;">To use this like an app, select "Add to Home Screen" in your browser menu.</p>
        
        <a href="https://ko-fi.com/afrorakda" target="_blank" style="display: inline-block; background: #111; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 15px; font-weight: bold; margin: 15px 0;">Support on Ko-fi</a>
        
        <p style="margin-top: 15px; font-size: 0.8rem; color: #999; cursor: pointer;" onclick="closeSupport()">[ Close ]</p>
    </div>
</div>

<script>
    const menuInput = document.getElementById('menu-list');
    const resultDisplay = document.getElementById('result-display');

    window.onload = () => {
        const saved = localStorage.getItem('fc_roulette_list');
        if (saved) menuInput.value = saved;
    };

    menuInput.addEventListener('input', () => {
        localStorage.setItem('fc_roulette_list', menuInput.value);
    });

    function clearList() {
        if(confirm("Clear all menus?")) {
            menuInput.value = "";
            localStorage.setItem('fc_roulette_list', "");
            resultDisplay.innerText = "Cleared";
        }
    }

    function decideMenu() {
        const lines = menuInput.value.split('\n').filter(line => line.trim() !== "");
        if (lines.length === 0) {
            resultDisplay.innerText = "Enter menus first!";
            return;
        }

        let count = 0;
        const interval = setInterval(() => {
            resultDisplay.innerText = lines[Math.floor(Math.random() * lines.length)];
            count++;
            if (count > 12) {
                clearInterval(interval);
                const final = lines[Math.floor(Math.random() * lines.length)];
                resultDisplay.innerText = "✨ " + final + " ✨";
            }
        }, 60);
    }

    // Modal Functions
    function showSupport() {
        document.getElementById('support-modal').style.display = 'flex';
    }
    function closeSupport() {
        document.getElementById('support-modal').style.display = 'none';
    }
</script>
</body>
</html>
