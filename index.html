<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>My Menu Roulette</title>
    
    <link rel="icon" href="image_14.png">
    <link rel="apple-touch-icon" href="image_14.png">

    <style>
        :root { --main: #333; --bg: #fff; --accent: #eee; --input-bg: #fafafa; --radius: 15px; --placeholder: #bbb; }
        
        * { 
            -webkit-touch-callout: none !important; 
            -webkit-user-select: none !important; 
            user-select: none !important; 
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-y;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); display: flex; justify-content: center; 
            padding: 0; margin: 0; color: var(--main); -webkit-font-smoothing: antialiased; 
            height: 100vh; overflow: hidden;
        }

        .container { 
            width: 100%; max-width: 380px; height: 100vh; 
            display: flex; flex-direction: column; position: relative; 
            padding: 10px 20px 20px; box-sizing: border-box; 
        }

        .main-unit {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        header { 
            display: flex; justify-content: space-between; align-items: start; 
            margin-bottom: 12px; padding-top: 5px;
        }
        .title-group h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.8px; margin: 0; }
        .subtitle { font-size: 0.75rem; color: #777; font-weight: 600; margin-top: 4px; }

        .hub-link { 
            text-decoration: none; font-size: 0.7rem; font-weight: 800; color: #999; 
            background: transparent; border: 1px solid #ddd; padding: 3px 8px; border-radius: 10px; 
            transition: 0.2s; cursor: pointer;
        }
        .hub-link:active { transform: scale(0.95); background: var(--accent); color: var(--main); }

        .textarea-wrapper { position: relative; height: 140px; width: 100%; margin-bottom: 15px; }

        textarea { 
            width: 100%; height: 100%; padding: 15px; border: 2px solid var(--accent); border-radius: var(--radius); 
            box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; 
            font-weight: 500; background: var(--input-bg);
            line-height: 1.5; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
            user-select: auto !important; -webkit-user-select: auto !important; 
        }
        textarea::placeholder { color: var(--placeholder); -webkit-text-fill-color: var(--placeholder); }
        textarea:focus { border-color: var(--main); background: #fff; }
        textarea:read-only { background: var(--accent); opacity: 0.6 !important; }

        .btn-clear-wrapper { position: absolute; right: 10px; bottom: 10px; display: none; }
        .btn-clear-wrapper.show { display: block; }
        .btn-clear {
            width: 32px; height: 32px; background: rgba(0,0,0,0.05); color: #888; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #eee;
        }
        .btn-clear:active { background: #e63946; color: #fff; border-color: #e63946; transform: scale(0.9); }

        #result-display {
            height: 90px; margin: 10px 0 20px;
            display: flex; align-items: center; justify-content: center;
            background-color: var(--input-bg); border: 2px dashed var(--accent); border-radius: var(--radius);
            font-size: 1.5rem; font-weight: 900; text-align: center; color: var(--main);
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        #result-display.win { 
            border: 3px solid var(--main); 
            background: #fff;
            animation: win-flash 0.5s ease-out;
        }
        #result-display span { display: block; }
        #result-display.win span { animation: bounce 0.4s cubic-bezier(0.36, 0, 0.66, -0.56) 2; }

        @keyframes win-flash {
            0% { background-color: var(--main); color: #fff; }
            100% { background-color: #fff; color: var(--main); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .decide-btn { 
            width: 100%; padding: 20px; background-color: var(--main); color: #fff; 
            border: none; border-radius: var(--radius); font-size: 1.2rem; font-weight: 900; 
            cursor: pointer; transition: 0.1s; -webkit-appearance: none; margin-bottom: 20px;
        }
        .decide-btn:active { transform: scale(0.97) translateY(2px); opacity: 0.9; }
        .decide-btn:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.6; }

        footer { padding: 15px 0 25px; text-align: center; border-top: 1px solid #f5f5f5; font-size: 11px; color: #666; font-weight: 600; }
        .footer-btns { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        
        .outline-btn { 
            background: #fff; color: var(--main); border: 2px solid var(--main); 
            padding: 10px; border-radius: var(--radius); text-decoration: none; 
            font-weight: 800; font-size: 12px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .outline-btn:active { background: var(--accent); transform: scale(0.97); }

        .footer-info { line-height: 1.6; }
        .footer-info a { color: inherit; text-decoration: underline; display: inline-block; padding: 4px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; width: 85%; max-width: 340px; padding: 30px; border-radius: var(--radius); position: relative; text-align: left; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; }
    </style>
</head>
