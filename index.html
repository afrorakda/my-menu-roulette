<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Menu Roulette - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 40px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            text-align: center;
        }

        .description {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            font-size: 1rem;
            color: var(--main);
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--main);
        }

        #result-display {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent);
            border-radius: var(--radius);
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            padding: 10px;
            word-break: break-all;
        }

        .decide-btn {
            width: 100%;
            background-color: #111;
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .decide-btn:active {
            opacity: 0.8;
        }

        footer {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            line-height: 1.6;
        }

        /* Modal for Support */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: var(--radius);
            width: 85%;
            max-width: 320px;
            text-align: center;
        }

        .support-btn {
            display: inline-block;
            background: #111;
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: var(--radius);
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Menu Roulette</h1>
    <p class="description">1 line = 1 menu. Your list is auto-saved.</p>
    
    <textarea id="menu-list" placeholder="Spaghetti&#10;Nasi Lemak&#10;Ramen..."></textarea>
    
    <div id="result-display">Ready?</div>
    
    <button class="decide-btn" onclick="decideMenu()">DECIDE</button>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    <span style="cursor:pointer; text-decoration:underline;" onclick="showSupport()">Privacy Policy</span> / afrorakda © 2026
</footer>

<div id="support-modal" class="modal" onclick="closeSupport()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Support & Info</h3>
        <p style="font-size: 0.9rem;">To use this like an app, "Add to Home Screen" from your browser menu.</p>
        <a href="https://ko-fi.com/afrorakda" class="support-btn" target="_blank">Support on Ko-fi</a>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #999; cursor: pointer;" onclick="closeSupport()">Close</p>
    </div>
</div>

<script>
    const menuInput = document.getElementById('menu-list');
    const resultDisplay = document.getElementById('result-display');

    // Load saved list
    window.onload = () => {
        const saved = localStorage.getItem('fc_roulette_list');
        if (saved) menuInput.value = saved;
    };

    // Auto save on input
    menuInput.addEventListener('input', () => {
        localStorage.setItem('fc_roulette_list', menuInput.value);
    });

    function decideMenu() {
        const lines = menuInput.value.split('\n').filter(line => line.trim() !== "");
        
        if (lines.length === 0) {
            resultDisplay.innerText = "Please enter menus!";
            return;
        }

        // Simple animation effect
        let count = 0;
        const interval = setInterval(() => {
            resultDisplay.innerText = lines[Math.floor(Math.random() * lines.length)];
            count++;
            if (count > 10) {
                clearInterval(interval);
                const final = lines[Math.floor(Math.random() * lines.length)];
                resultDisplay.innerText = "✨ " + final + " ✨";
            }
        }, 50);
    }

    function showSupport() {
        document.getElementById('support-modal').style.display = 'flex';
    }

    function closeSupport() {
        document.getElementById('support-modal').style.display = 'none';
    }
</script>

</body>
</html>
