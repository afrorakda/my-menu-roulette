<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Menu Roulette - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 40px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 { font-size: 1.5rem; font-weight: 800; margin: 0; text-align: center; }
        .description { font-size: 0.8rem; color: #999; text-align: center; margin-bottom: 5px; }

        textarea {
            width: 100%;
            height: 180px;
            background-color: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            font-size: 1rem;
            color: var(--main);
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        .clear-row { text-align: right; margin-top: -5px; }
        .clear-btn { background: none; border: none; color: #bbb; font-size: 0.75rem; font-weight: 700; cursor: pointer; padding: 5px; }

        #result-display {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent);
            border-radius: var(--radius);
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            padding: 15px;
            margin-bottom: 5px;
        }

        .decide-btn {
            width: 100%;
            background-color: #111;
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
        }

        /* afrorakda Standard Support Buttons */
        .support-section {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .kofi-btn {
            background-color: #111;
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .home-btn {
            background-color: #eee;
            color: #666;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            width: 100%;
            padding: 40px 0 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #bbb;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Menu Roulette</h1>
    <p class="description">1 line = 1 menu. Auto-saved.</p>
    
    <textarea id="menu-list" placeholder="Nasi Lemak&#10;Laksa&#10;Ramen..."></textarea>
    <div class="clear-row">
        <button class="clear-btn" onclick="clearList()">[ CLEAR ALL ]</button>
    </div>
    
    <div id="result-display">Ready?</div>
    <button class="decide-btn" onclick="decideMenu()">DECIDE</button>

    <div class="support-section">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕ Support me on Ko-fi</a>
        <button class="home-btn" onclick="alert('Select Add to Home Screen in your browser menu to use this like an app!')">Add to Home Screen</button>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<script>
    const menuInput = document.getElementById('menu-list');
    const resultDisplay = document.getElementById('result-display');

    window.onload = () => {
        const saved = localStorage.getItem('fc_roulette_list');
        if (saved) menuInput.value = saved;
    };

    menuInput.addEventListener('input', () => {
        localStorage.setItem('fc_roulette_list', menuInput.value);
    });

    function clearList() {
        if(confirm("Clear all menus?")) {
            menuInput.value = "";
            localStorage.setItem('fc_roulette_list', "");
            resultDisplay.innerText = "Cleared";
        }
    }

    function decideMenu() {
        const lines = menuInput.value.split('\n').filter(line => line.trim() !== "");
        if (lines.length === 0) {
            resultDisplay.innerText = "Enter menus first!";
            return;
        }

        let count = 0;
        const interval = setInterval(() => {
            resultDisplay.innerText = lines[Math.floor(Math.random() * lines.length)];
            count++;
            if (count > 10) {
                clearInterval(interval);
                const final = lines[Math.floor(Math.random() * lines.length)];
                resultDisplay.innerText = "✨ " + final + " ✨";
            }
        }, 60);
    }
</script>

</body>
</html>
